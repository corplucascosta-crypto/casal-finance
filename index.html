<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0a0e27">
    <title>💰 Casal Finance</title>
    
    <!-- Fontes Google -->
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    
    <!-- Chart.js para gráficos -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    
    <!-- Ícones Lucide -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0e27;
            --bg-secondary: #0f1435;
            --bg-card: rgba(255, 255, 255, 0.03);
            --accent-green: #00ff88;
            --accent-red: #ff3860;
            --accent-blue: #4d7cff;
            --accent-purple: #7b2fff;
            --accent-yellow: #ffd93d;
            --text-primary: #e0e0e0;
            --text-secondary: #a0a0b0;
            --border: rgba(255, 255, 255, 0.06);
            --glass: rgba(255, 255, 255, 0.02);
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        /* Efeito de fundo animado */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 50%, rgba(0, 255, 136, 0.03) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(123, 47, 255, 0.03) 0%, transparent 50%),
                radial-gradient(circle at 50% 80%, rgba(77, 124, 255, 0.03) 0%, transparent 50%);
            pointer-events: none;
            z-index: -1;
        }

        /* Partículas animadas */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }

        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: var(--accent-green);
            border-radius: 50%;
            animation: float 6s infinite;
            opacity: 0.3;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0) translateX(0);
                opacity: 0.3;
            }
            50% {
                transform: translateY(-100px) translateX(50px);
                opacity: 0.8;
            }
        }

        .app-container {
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
        }

        /* Header */
        .header {
            text-align: center;
            padding: 30px 0 20px;
            position: relative;
        }

        .header h1 {
            font-size: 2em;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent-green), var(--accent-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 5px;
            animation: glow 3s ease-in-out infinite alternate;
        }

        @keyframes glow {
            0% { filter: drop-shadow(0 0 5px rgba(0, 255, 136, 0.3)); }
            100% { filter: drop-shadow(0 0 15px rgba(77, 124, 255, 0.5)); }
        }

        .header .subtitle {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85em;
            color: var(--text-secondary);
        }

        .header .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: var(--accent-green);
            border-radius: 50%;
            margin-right: 5px;
            animation: pulse 2s infinite;
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* Cards */
        .cards-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 16px;
            box-shadow: var(--shadow);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .card:hover {
            transform: translateY(-2px);
            border-color: rgba(0, 255, 136, 0.2);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
        }

        .card:active {
            transform: scale(0.98);
        }

        .card-full {
            grid-column: 1 / -1;
        }

        .card-label {
            font-size: 0.7em;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-secondary);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .card-label i {
            font-style: normal;
            font-size: 1.1em;
        }

        .card-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.5em;
            font-weight: 700;
        }

        .card-value.positive {
            color: var(--accent-green);
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.3);
        }

        .card-value.negative {
            color: var(--accent-red);
            text-shadow: 0 0 20px rgba(255, 56, 96, 0.3);
        }

        .card-value.neutral {
            color: var(--accent-blue);
        }

        .comparativo-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 5px;
            padding: 8px 0;
        }

        .comparativo-bar {
            flex: 1;
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            margin: 0 10px;
            overflow: hidden;
        }

        .comparativo-fill {
            height: 100%;
            border-radius: 2px;
            transition: width 1s ease;
        }

        .comparativo-fill.lucas {
            background: var(--accent-green);
        }

        .comparativo-fill.beatriz {
            background: var(--accent-blue);
        }

        /* Gráfico */
        .chart-container {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: var(--shadow);
            position: relative;
            overflow: hidden;
        }

        .chart-container::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(0,255,136,0.02) 0%, transparent 70%);
            pointer-events: none;
        }

        .chart-title {
            font-size: 0.85em;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-secondary);
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .chart-wrapper {
            position: relative;
            height: 250px;
            width: 100%;
        }

        /* Últimos Lançamentos */
        .transactions {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 100px;
            box-shadow: var(--shadow);
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .filter-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.75em;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Space Grotesk', sans-serif;
        }

        .filter-btn:hover, .filter-btn.active {
            background: rgba(0,255,136,0.1);
            border-color: var(--accent-green);
            color: var(--accent-green);
        }

        .transaction-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid var(--border);
            transition: all 0.3s;
            border-radius: 8px;
            margin-bottom: 2px;
        }

        .transaction-item:hover {
            background: rgba(255,255,255,0.02);
        }

        .transaction-item:last-child {
            border-bottom: none;
        }

        .transaction-icon {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2em;
            margin-right: 10px;
            flex-shrink: 0;
        }

        .transaction-icon.despesa {
            background: rgba(255, 56, 96, 0.1);
        }

        .transaction-icon.receita {
            background: rgba(0, 255, 136, 0.1);
        }

        .transaction-info {
            flex: 1;
            min-width: 0;
        }

        .transaction-desc {
            font-weight: 500;
            font-size: 0.9em;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .transaction-meta {
            font-size: 0.7em;
            color: var(--text-secondary);
            margin-top: 2px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .transaction-badge {
            font-size: 0.65em;
            padding: 2px 8px;
            border-radius: 10px;
            background: rgba(255,255,255,0.05);
            white-space: nowrap;
        }

        .transaction-value {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 700;
            font-size: 0.9em;
            text-align: right;
            flex-shrink: 0;
        }

        .transaction-value.despesa {
            color: var(--accent-red);
        }

        .transaction-value.receita {
            color: var(--accent-green);
        }

        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 500px;
            background: rgba(15, 20, 53, 0.95);
            backdrop-filter: blur(30px);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-around;
            padding: 8px 0 16px;
            border-radius: 20px 20px 0 0;
            box-shadow: 0 -8px 32px rgba(0, 0, 0, 0.4);
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            background: none;
            border: none;
            color: var(--text-secondary);
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.65em;
            cursor: pointer;
            padding: 8px 12px;
            border-radius: 12px;
            transition: all 0.3s;
            position: relative;
        }

        .nav-item.active {
            color: var(--accent-green);
        }

        .nav-item.active::before {
            content: '';
            position: absolute;
            top: -4px;
            width: 20px;
            height: 2px;
            background: var(--accent-green);
            border-radius: 2px;
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
        }

        .nav-item i {
            font-style: normal;
            font-size: 1.4em;
            transition: all 0.3s;
        }

        .nav-item.active i {
            filter: drop-shadow(0 0 8px rgba(0, 255, 136, 0.5));
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 2px solid var(--border);
            border-top-color: var(--accent-green);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 30px;
            color: var(--text-secondary);
        }

        .empty-state i {
            font-size: 3em;
            display: block;
            margin-bottom: 10px;
            opacity: 0.5;
        }

        /* Banner de atualização */
        .update-banner {
            text-align: center;
            padding: 8px;
            background: rgba(77, 124, 255, 0.1);
            border-radius: 20px;
            font-size: 0.7em;
            color: var(--accent-blue);
            margin-bottom: 15px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .update-banner:hover {
            background: rgba(77, 124, 255, 0.2);
        }

        /* Toast notification */
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--accent-green);
            color: #000;
            padding: 10px 20px;
            border-radius: 25px;
            font-weight: 600;
            font-size: 0.85em;
            z-index: 200;
            animation: slideUp 0.3s ease, fadeOut 0.3s ease 2s forwards;
            box-shadow: 0 8px 20px rgba(0,255,136,0.3);
        }

        @keyframes slideUp {
            from { transform: translateX(-50%) translateY(20px); opacity: 0; }
            to { transform: translateX(-50%) translateY(0); opacity: 1; }
        }

        @keyframes fadeOut {
            to { opacity: 0; }
        }

        /* Responsivo Desktop */
        @media (min-width: 768px) {
            .app-container {
                max-width: 800px;
                padding: 30px;
            }
            
            .cards-grid {
                grid-template-columns: repeat(3, 1fr);
            }
            
            .bottom-nav {
                max-width: 800px;
            }
            
            .chart-wrapper {
                height: 300px;
            }
        }

        @media (min-width: 1024px) {
            .app-container {
                max-width: 900px;
            }
        }
    </style>
</head>
<body>
    <!-- Partículas de fundo -->
    <div class="particles" id="particles"></div>

    <div class="app-container">
        <!-- Header -->
        <div class="header">
            <h1>💰 Casal Finance</h1>
            <p class="subtitle">
                <span class="status-dot"></span>Lucas & Beatriz
            </p>
        </div>

        <!-- Banner de atualização -->
        <div class="update-banner" onclick="loadData()" id="updateBanner" style="display:none;">
            🔄 Toque para atualizar os dados
        </div>

        <!-- Loading -->
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Carregando dados...</p>
        </div>

        <!-- Erro -->
        <div class="loading" id="errorState" style="display:none;">
            <p style="font-size:2em;">⚠️</p>
            <p style="color: var(--accent-red); margin-top:10px;">Erro ao carregar dados</p>
            <p style="font-size:0.8em; margin-top:5px;" id="errorMessage"></p>
            <button onclick="loadData()" style="margin-top:15px; background: var(--accent-green); color:#000; border:none; padding:10px 25px; border-radius:25px; font-weight:600; cursor:pointer; font-family: 'Space Grotesk', sans-serif;">
                Tentar novamente
            </button>
        </div>

        <!-- Conteúdo Principal -->
        <div id="mainContent" style="display: none;">
            <!-- Cards -->
            <div class="cards-grid">
                <div class="card">
                    <div class="card-label"><i>💰</i> Saldo do Mês</div>
                    <div class="card-value positive" id="saldoMes">R$ 0,00</div>
                </div>
                <div class="card">
                    <div class="card-label"><i>💸</i> Despesas</div>
                    <div class="card-value negative" id="totalDespesas">R$ 0,00</div>
                </div>
                <div class="card">
                    <div class="card-label"><i>💵</i> Receitas</div>
                    <div class="card-value neutral" id="totalReceitas">R$ 0,00</div>
                </div>
                <div class="card card-full">
                    <div class="card-label"><i>📊</i> Comparativo do Mês</div>
                    <div class="comparativo-row">
                        <span style="color: var(--accent-green); font-weight:600; font-size:0.9em;">👤 Lucas</span>
                        <div class="comparativo-bar">
                            <div class="comparativo-fill lucas" id="barLucas" style="width: 50%;"></div>
                        </div>
                        <span class="card-value" style="font-size:1em;" id="gastoLucas">R$ 0,00</span>
                    </div>
                    <div class="comparativo-row">
                        <span style="color: var(--accent-blue); font-weight:600; font-size:0.9em;">👤 Beatriz</span>
                        <div class="comparativo-bar">
                            <div class="comparativo-fill beatriz" id="barBeatriz" style="width: 50%;"></div>
                        </div>
                        <span class="card-value" style="font-size:1em;" id="gastoBeatriz">R$ 0,00</span>
                    </div>
                </div>
            </div>

            <!-- Gráfico -->
            <div class="chart-container">
                <div class="chart-title">📈 Gastos por Categoria</div>
                <div class="chart-wrapper">
                    <canvas id="categoryChart"></canvas>
                </div>
            </div>

            <!-- Últimos Lançamentos -->
            <div class="transactions">
                <div class="section-header">
                    <div class="chart-title">🕐 Últimos Lançamentos</div>
                    <div>
                        <button class="filter-btn active" onclick="filterTransactions('todos', this)">Todos</button>
                        <button class="filter-btn" onclick="filterTransactions('despesas', this)">Despesas</button>
                    </div>
                </div>
                <div id="transactionsList"></div>
            </div>
        </div>

        <!-- Navegação Inferior -->
        <div class="bottom-nav">
            <button class="nav-item active" onclick="showTab('home', this)">
                <i>🏠</i>
                Home
            </button>
            <button class="nav-item" onclick="openForms()">
                <i>➕</i>
                Lançar
            </button>
            <button class="nav-item" onclick="showTab('analise', this)">
                <i>📊</i>
                Análise
            </button>
        </div>
    </div>

    <script>
        // ============================================
        // CONFIGURAÇÃO
        // ============================================
        
        const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT1NGVxknZtT9snTocuWpEXfDpADWqsQAbTujDS6_hLQxZn0UdfWHVynKsQSiialbe8OHQ79kg-jNwZ/pub?gid=2001858508&single=true&output=csv';
        const FORMS_URL = 'https://forms.gle/NXFDs4YkgeLhcnto8';
        const API_KEY = 'AIzaSyBUVP6VnCfEnWJVjuWMOqaoLE6kKk9XA7g';
        
        // ============================================
        // VARIÁVEIS GLOBAIS
        // ============================================
        
        let allData = [];
        let categoryChart = null;
        let currentFilter = 'todos';
        
        // ============================================
        // INICIALIZAÇÃO
        // ============================================
        
        // Criar partículas
        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 20; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 6 + 's';
                particle.style.animationDuration = (Math.random() * 6 + 3) + 's';
                container.appendChild(particle);
            }
        }
        createParticles();
        
        // Carregar dados
        async function loadData() {
            const loadingEl = document.getElementById('loading');
            const errorEl = document.getElementById('errorState');
            const mainEl = document.getElementById('mainContent');
            const updateBanner = document.getElementById('updateBanner');
            
            loadingEl.style.display = 'block';
            errorEl.style.display = 'none';
            mainEl.style.display = 'none';
            updateBanner.style.display = 'none';
            
            try {
                const response = await fetch(SHEET_URL, {
                    cache: 'no-store'
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const csvText = await response.text();
                
                if (!csvText || csvText.trim() === '') {
                    throw new Error('Planilha vazia. Faça alguns lançamentos primeiro.');
                }
                
                // Parse CSV
                const rows = csvText.split('\n');
                if (rows.length < 2) {
                    throw new Error('Apenas cabeçalho encontrado. Adicione lançamentos.');
                }
                
                const headers = rows[0].split(',');
                console.log('📋 Headers:', headers);
                console.log('📊 Total linhas:', rows.length - 1);
                
                allData = [];
                for (let i = 1; i < rows.length; i++) {
                    if (rows[i].trim() === '') continue;
                    
                    const values = parseCSVLine(rows[i]);
                    if (values.length < 8) continue;
                    
                    allData.push({
                        timestamp: values[0] || '',
                        valor: parseFloat((values[1] || '0').replace(',', '.')) || 0,
                        tipo: values[2] || '',
                        categoria: values[3] || 'Outros',
                        subcategoria: values[4] || '',
                        metodo: values[5] || '',
                        parcelas: values[6] || '',
                        responsavel: values[7] || '',
                        descricao: values[8] || '',
                        tipoGasto: values[9] || ''
                    });
                }
                
                // Ordenar por data (mais recente primeiro)
                allData.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
                
                console.log('✅ Dados carregados:', allData.length, 'registros');
                
                updateDashboard();
                loadingEl.style.display = 'none';
                mainEl.style.display = 'block';
                
                showToast('Dados atualizados!');
                
            } catch (error) {
                console.error('❌ Erro:', error);
                loadingEl.style.display = 'none';
                errorEl.style.display = 'block';
                document.getElementById('errorMessage').textContent = error.message;
            }
        }
        
        // Parse CSV
        function parseCSVLine(line) {
            const result = [];
            let current = '';
            let inQuotes = false;
            
            for (let i = 0; i < line.length; i++) {
                const char = line[i];
                
                if (char === '"' && !inQuotes) {
                    inQuotes = true;
                } else if (char === '"' && inQuotes) {
                    if (i + 1 < line.length && line[i + 1] === '"') {
                        current += '"';
                        i++;
                    } else {
                        inQuotes = false;
                    }
                } else if (char === ',' && !inQuotes) {
                    result.push(current.trim());
                    current = '';
                } else {
                    current += char;
                }
            }
            result.push(current.trim());
            
            return result;
        }
        
        // Atualizar Dashboard
        function updateDashboard() {
            const agora = new Date();
            const mesAtual = agora.toISOString().slice(0, 7);
            
            const dadosMes = allData.filter(item => 
                item.timestamp && item.timestamp.startsWith(mesAtual)
            );
            
            const receitas = dadosMes
                .filter(item => item.tipo.toLowerCase() === 'receita')
                .reduce((sum, item) => sum + item.valor, 0);
            
            const despesas = dadosMes
                .filter(item => item.tipo.toLowerCase() === 'despesa')
                .reduce((sum, item) => sum + item.valor, 0);
            
            const saldo = receitas - despesas;
            
            const gastosLucas = dadosMes
                .filter(item => item.responsavel && 
                    item.responsavel.toLowerCase().includes('lucas') && 
                    item.tipo.toLowerCase() === 'despesa')
                .reduce((sum, item) => sum + item.valor, 0);
            
            const gastosBeatriz = dadosMes
                .filter(item => item.responsavel && 
                    item.responsavel.toLowerCase().includes('beatriz') && 
                    item.tipo.toLowerCase() === 'despesa')
                .reduce((sum, item) => sum + item.valor, 0);
            
            // Atualizar cards
            document.getElementById('saldoMes').textContent = formatMoney(saldo);
            document.getElementById('saldoMes').className = `card-value ${saldo >= 0 ? 'positive' : 'negative'}`;
            document.getElementById('totalDespesas').textContent = formatMoney(despesas);
            document.getElementById('totalReceitas').textContent = formatMoney(receitas);
            document.getElementById('gastoLucas').textContent = formatMoney(gastosLucas);
            document.getElementById('gastoBeatriz').textContent = formatMoney(gastosBeatriz);
            
            // Barras comparativas
            const totalGastos = gastosLucas + gastosBeatriz;
            if (totalGastos > 0) {
                document.getElementById('barLucas').style.width = (gastosLucas / totalGastos * 100) + '%';
                document.getElementById('barBeatriz').style.width = (gastosBeatriz / totalGastos * 100) + '%';
            }
            
            // Atualizar gráfico
            updateChart(dadosMes);
            
            // Atualizar lista
            filterTransactions(currentFilter);
        }
        
        // Formatar moeda
        function formatMoney(value) {
            return new Intl.NumberFormat('pt-BR', {
                style: 'currency',
                currency: 'BRL'
            }).format(Math.abs(value));
        }
        
        // Atualizar gráfico
        function updateChart(dadosMes) {
            const despesas = dadosMes.filter(item => item.tipo.toLowerCase() === 'despesa');
            
            const categorias = {};
            despesas.forEach(item => {
                const cat = item.categoria || 'Outros';
                categorias[cat] = (categorias[cat] || 0) + item.valor;
            });
            
            const sorted = Object.entries(categorias).sort((a, b) => b[1] - a[1]);
            const labels = sorted.map(([cat]) => cat);
            const values = sorted.map(([, val]) => val);
            
            const colors = [
                '#ff3860', '#ff6b6b', '#ffd93d', '#6bcb77', 
                '#4d96ff', '#7b2fff', '#00d2ff', '#ff8c00',
                '#a29bfe', '#fd79a8'
            ];
            
            const ctx = document.getElementById('categoryChart').getContext('2d');
            
            if (categoryChart) {
                categoryChart.destroy();
            }
            
            if (labels.length === 0) {
                // Gráfico vazio
                categoryChart = new Chart(ctx, {
                    type: 'doughnut',
                    data: {
                        labels: ['Sem dados'],
                        datasets: [{
                            data: [1],
                            backgroundColor: ['rgba(255,255,255,0.1)'],
                            borderColor: '#0a0e27',
                            borderWidth: 3
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { display: false }
                        }
                    }
                });
                return;
            }
            
            categoryChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: labels,
                    datasets: [{
                        data: values,
                        backgroundColor: colors.slice(0, labels.length),
                        borderColor: '#0a0e27',
                        borderWidth: 3,
                        hoverBorderColor: '#00ff88',
                        hoverBorderWidth: 3,
                        hoverBorderDash: [5, 5]
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    cutout: '65%',
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: {
                                color: '#e0e0e0',
                                font: {
                                    family: 'Space Grotesk',
                                    size: 11
                                },
                                padding: 15,
                                usePointStyle: true,
                                pointStyleWidth: 8
                            }
                        },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    return ` ${context.label}: ${formatMoney(context.raw)}`;
                                }
                            }
                        }
                    }
                }
            });
        }
        
        // Filtrar transações
        function filterTransactions(filter, btnElement) {
            currentFilter = filter;
            
            // Atualizar botões
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            if (btnElement) {
                btnElement.classList.add('active');
            }
            
            let filtered = allData;
            if (filter === 'despesas') {
                filtered = allData.filter(item => item.tipo.toLowerCase() === 'despesa');
            }
            
            const recentes = filtered.slice(0, 15);
            const listEl = document.getElementById('transactionsList');
            
            if (recentes.length === 0) {
                listEl.innerHTML = `
                    <div class="empty-state">
                        <i>📭</i>
                        <p>Nenhum lançamento encontrado</p>
                        <p style="font-size:0.8em;">Toque em "+" para começar</p>
                    </div>`;
                return;
            }
            
            listEl.innerHTML = recentes.map(item => {
                const isDespesa = item.tipo.toLowerCase() === 'despesa';
                const categoriaIcon = getCategoriaIcon(item.categoria);
                const valorFormatado = formatMoney(Math.abs(item.valor));
                
                return `
                    <div class="transaction-item">
                        <div class="transaction-icon ${isDespesa ? 'despesa' : 'receita'}">
                            ${categoriaIcon}
                        </div>
                        <div class="transaction-info">
                            <div class="transaction-desc">
                                ${item.subcategoria || item.descricao || item.categoria || 'Sem descrição'}
                            </div>
                            <div class="transaction-meta">
                                <span>${item.responsavel || '—'}</span>
                                <span>•</span>
                                <span>${formatDate(item.timestamp)}</span>
                                ${item.metodo ? `<span class="transaction-badge">${item.metodo}</span>` : ''}
                            </div>
                        </div>
                        <div class="transaction-value ${isDespesa ? 'despesa' : 'receita'}">
                            ${isDespesa ? '−' : '+'} ${valorFormatado}
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        // Ícone por categoria
        function getCategoriaIcon(categoria) {
            const icons = {
                'Alimentação': '🍕',
                'Moradia': '🏠',
                'Transporte': '🚗',
                'Lazer': '🎮',
                'Saúde': '💊',
                'Educação': '📚',
                'Assinaturas': '📺',
                'Vestuário': '👕',
                'Mercado': '🛒',
                'Investimentos': '📈',
                'Outros': '📌'
            };
            return icons[categoria] || '💰';
        }
        
        // Formatar data
        function formatDate(timestamp) {
            if (!timestamp) return '';
            try {
                const date = new Date(timestamp);
                if (isNaN(date.getTime())) return timestamp.slice(0, 10);
                return date.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit' });
            } catch {
                return timestamp.slice(0, 10);
            }
        }
        
        // Navegação
        function showTab(tab, btnElement) {
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            if (btnElement) {
                btnElement.classList.add('active');
            }
            
            if (tab === 'analise') {
                showToast('📊 Em breve: análises detalhadas!');
            }
        }
        
        // Abrir Forms
        function openForms() {
            window.open(FORMS_URL, '_blank');
        }
        
        // Toast
        function showToast(message) {
            const existing = document.querySelector('.toast');
            if (existing) existing.remove();
            
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            document.body.appendChild(toast);
            
            setTimeout(() => toast.remove(), 2500);
        }
        
        // PWA Install
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
        });
        
        // Atualização periódica (a cada 60 segundos)
        setInterval(() => {
            loadData();
        }, 60000);
        
        // Atualização ao voltar para a aba
        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible') {
                document.getElementById('updateBanner').style.display = 'block';
                setTimeout(() => {
                    document.getElementById('updateBanner').style.display = 'none';
                }, 5000);
            }
        });
        
        // Iniciar app
        loadData();
        
        console.log('🚀 Casal Finance inicializado');
        console.log('📊 Fonte:', SHEET_URL);
        console.log('📝 Forms:', FORMS_URL);
        console.log('🔑 API Key:', API_KEY.slice(0, 10) + '...');
    </script>
</body>
</html>
