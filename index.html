<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0a0e27">
    <title>💰 Casal Finance</title>
    
    <!-- Fontes Google -->
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    
    <!-- Chart.js para gráficos -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0e27;
            --bg-secondary: #0f1435;
            --bg-card: rgba(255, 255, 255, 0.03);
            --accent-green: #00ff88;
            --accent-red: #ff3860;
            --accent-blue: #4d7cff;
            --accent-purple: #7b2fff;
            --text-primary: #e0e0e0;
            --text-secondary: #a0a0b0;
            --border: rgba(255, 255, 255, 0.06);
            --glass: rgba(255, 255, 255, 0.02);
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        /* Efeito de fundo animado */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 50%, rgba(0, 255, 136, 0.03) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(123, 47, 255, 0.03) 0%, transparent 50%),
                radial-gradient(circle at 50% 80%, rgba(77, 124, 255, 0.03) 0%, transparent 50%);
            pointer-events: none;
            z-index: -1;
        }

        .app-container {
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
        }

        /* Header */
        .header {
            text-align: center;
            padding: 30px 0 20px;
        }

        .header h1 {
            font-size: 2em;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent-green), var(--accent-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 5px;
        }

        .header .subtitle {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85em;
            color: var(--text-secondary);
        }

        /* Cards */
        .cards-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 16px;
            box-shadow: var(--shadow);
        }

        .card-full {
            grid-column: 1 / -1;
        }

        .card-label {
            font-size: 0.75em;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .card-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.5em;
            font-weight: 700;
        }

        .card-value.positive {
            color: var(--accent-green);
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.3);
        }

        .card-value.negative {
            color: var(--accent-red);
            text-shadow: 0 0 20px rgba(255, 56, 96, 0.3);
        }

        /* Gráfico */
        .chart-container {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: var(--shadow);
        }

        .chart-title {
            font-size: 0.85em;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-secondary);
            margin-bottom: 15px;
        }

        /* Últimos Lançamentos */
        .transactions {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 100px;
            box-shadow: var(--shadow);
        }

        .transaction-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
        }

        .transaction-item:last-child {
            border-bottom: none;
        }

        .transaction-info {
            flex: 1;
        }

        .transaction-desc {
            font-weight: 500;
            font-size: 0.9em;
        }

        .transaction-meta {
            font-size: 0.75em;
            color: var(--text-secondary);
            margin-top: 3px;
        }

        .transaction-value {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 700;
            font-size: 0.95em;
        }

        .transaction-value.despesa {
            color: var(--accent-red);
        }

        .transaction-value.receita {
            color: var(--accent-green);
        }

        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 500px;
            background: rgba(15, 20, 53, 0.95);
            backdrop-filter: blur(30px);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-around;
            padding: 12px 0;
            border-radius: 20px 20px 0 0;
            box-shadow: 0 -8px 32px rgba(0, 0, 0, 0.4);
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            background: none;
            border: none;
            color: var(--text-secondary);
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.7em;
            cursor: pointer;
            padding: 8px 16px;
            border-radius: 12px;
            transition: all 0.3s;
        }

        .nav-item.active {
            color: var(--accent-green);
        }

        .nav-item svg {
            width: 22px;
            height: 22px;
            transition: all 0.3s;
        }

        .nav-item.active svg {
            filter: drop-shadow(0 0 8px rgba(0, 255, 136, 0.5));
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--accent-green);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Responsivo Desktop */
        @media (min-width: 768px) {
            .app-container {
                max-width: 800px;
                padding: 30px;
            }
            
            .cards-grid {
                grid-template-columns: repeat(4, 1fr);
            }
            
            .bottom-nav {
                max-width: 800px;
            }
            
            .chart-container {
                padding: 30px;
            }
        }

        /* PWA Install Banner */
        .install-banner {
            background: var(--accent-purple);
            color: white;
            text-align: center;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 20px;
            cursor: pointer;
            font-weight: 500;
            display: none;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <div class="header">
            <h1>💰 Casal Finance</h1>
            <p class="subtitle">Lucas & Beatriz</p>
        </div>

        <!-- Banner Instalação PWA -->
        <div class="install-banner" id="installBanner" onclick="installApp()">
            📲 Toque para instalar o app
        </div>

        <!-- Loading -->
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Carregando dados...</p>
        </div>

        <!-- Conteúdo Principal -->
        <div id="mainContent" style="display: none;">
            <!-- Cards -->
            <div class="cards-grid">
                <div class="card">
                    <div class="card-label">💰 Saldo do Mês</div>
                    <div class="card-value positive" id="saldoMes">R$ 0,00</div>
                </div>
                <div class="card">
                    <div class="card-label">💸 Despesas</div>
                    <div class="card-value negative" id="totalDespesas">R$ 0,00</div>
                </div>
                <div class="card card-full">
                    <div class="card-label">📊 Comparativo</div>
                    <div style="display: flex; gap: 15px; margin-top: 5px;">
                        <div>
                            <span style="color: var(--accent-green); font-weight: 600;">👤 Lucas</span>
                            <div class="card-value" style="font-size: 1.1em;" id="gastoLucas">R$ 0,00</div>
                        </div>
                        <div>
                            <span style="color: var(--accent-blue); font-weight: 600;">👤 Beatriz</span>
                            <div class="card-value" style="font-size: 1.1em;" id="gastoBeatriz">R$ 0,00</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Gráfico -->
            <div class="chart-container">
                <div class="chart-title">📈 Gastos por Categoria</div>
                <canvas id="categoryChart" height="250"></canvas>
            </div>

            <!-- Últimos Lançamentos -->
            <div class="transactions">
                <div class="chart-title">🕐 Últimos Lançamentos</div>
                <div id="transactionsList"></div>
            </div>
        </div>

        <!-- Navegação Inferior -->
        <div class="bottom-nav">
            <button class="nav-item active" onclick="showTab('home')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                    <polyline points="9 22 9 12 15 12 15 22"/>
                </svg>
                Home
            </button>
            <button class="nav-item" onclick="window.open('COLE_AQUI_O_LINK_DO_FORMS', '_blank')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"/>
                    <line x1="12" y1="8" x2="12" y2="16"/>
                    <line x1="8" y1="12" x2="16" y2="12"/>
                </svg>
                Lançar
            </button>
            <button class="nav-item" onclick="showTab('analise')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="18" y1="20" x2="18" y2="10"/>
                    <line x1="12" y1="20" x2="12" y2="4"/>
                    <line x1="6" y1="20" x2="6" y2="14"/>
                </svg>
                Análise
            </button>
        </div>
    </div>

    <script>
        // ============================================
        // CONFIGURAÇÃO - COLE AQUI SUAS INFORMAÇÕES
        // ============================================
        
        // Link de publicação CSV da sua planilha
        const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/SEU_ID_DA_PLANILHA/pub?gid=0&single=true&output=csv';
        
        // Link do Google Forms para lançar gastos
        const FORMS_URL = 'https://docs.google.com/forms/d/e/SEU_ID_DO_FORMS/viewform';
        
        // ============================================
        // LÓGICA DO APP
        // ============================================
        
        let allData = [];
        let categoryChart = null;
        
        // Carregar dados da planilha
        async function loadData() {
            try {
                const response = await fetch(SHEET_URL);
                const csvText = await response.text();
                
                // Parse CSV
                const rows = csvText.split('\n');
                const headers = rows[0].split(',');
                
                allData = [];
                for (let i = 1; i < rows.length; i++) {
                    if (rows[i].trim() === '') continue;
                    
                    const values = parseCSVLine(rows[i]);
                    if (values.length < 10) continue;
                    
                    allData.push({
                        timestamp: values[0],
                        valor: parseFloat(values[1].replace(',', '.')) || 0,
                        tipo: values[2],
                        categoria: values[3],
                        subcategoria: values[4],
                        metodo: values[5],
                        parcelas: values[6],
                        responsavel: values[7],
                        descricao: values[8],
                        tipoGasto: values[9]
                    });
                }
                
                // Ordenar por data (mais recente primeiro)
                allData.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
                
                updateDashboard();
                document.getElementById('loading').style.display = 'none';
                document.getElementById('mainContent').style.display = 'block';
                
            } catch (error) {
                console.error('Erro ao carregar dados:', error);
                document.getElementById('loading').innerHTML = 
                    '<p style="color: var(--accent-red);">Erro ao carregar. Verifique o link da planilha.</p>';
            }
        }
        
        // Parse de linha CSV
        function parseCSVLine(line) {
            const result = [];
            let current = '';
            let inQuotes = false;
            
            for (let i = 0; i < line.length; i++) {
                const char = line[i];
                
                if (char === '"') {
                    inQuotes = !inQuotes;
                } else if (char === ',' && !inQuotes) {
                    result.push(current.trim());
                    current = '';
                } else {
                    current += char;
                }
            }
            result.push(current.trim());
            
            return result;
        }
        
        // Atualizar Dashboard
        function updateDashboard() {
            const mesAtual = new Date().toISOString().slice(0, 7); // YYYY-MM
            
            // Filtrar mês atual
            const dadosMes = allData.filter(item => 
                item.timestamp && item.timestamp.startsWith(mesAtual)
            );
            
            // Cálculos
            const receitas = dadosMes
                .filter(item => item.tipo === 'Receita')
                .reduce((sum, item) => sum + item.valor, 0);
            
            const despesas = dadosMes
                .filter(item => item.tipo === 'Despesa')
                .reduce((sum, item) => sum + item.valor, 0);
            
            const saldo = receitas - despesas;
            
            const gastosLucas = dadosMes
                .filter(item => item.responsavel === 'Lucas' && item.tipo === 'Despesa')
                .reduce((sum, item) => sum + item.valor, 0);
            
            const gastosBeatriz = dadosMes
                .filter(item => item.responsavel === 'Beatriz' && item.tipo === 'Despesa')
                .reduce((sum, item) => sum + item.valor, 0);
            
            // Atualizar cards
            document.getElementById('saldoMes').textContent = formatMoney(saldo);
            document.getElementById('saldoMes').className = `card-value ${saldo >= 0 ? 'positive' : 'negative'}`;
            document.getElementById('totalDespesas').textContent = formatMoney(despesas);
            document.getElementById('gastoLucas').textContent = formatMoney(gastosLucas);
            document.getElementById('gastoBeatriz').textContent = formatMoney(gastosBeatriz);
            
            // Atualizar gráfico
            updateChart(dadosMes);
            
            // Atualizar lista
            updateTransactionList();
        }
        
        // Formatar moeda
        function formatMoney(value) {
            return new Intl.NumberFormat('pt-BR', {
                style: 'currency',
                currency: 'BRL'
            }).format(value);
        }
        
        // Atualizar gráfico
        function updateChart(dadosMes) {
            const despesas = dadosMes.filter(item => item.tipo === 'Despesa');
            
            // Agrupar por categoria
            const categorias = {};
            despesas.forEach(item => {
                const cat = item.categoria || 'Outros';
                categorias[cat] = (categorias[cat] || 0) + item.valor;
            });
            
            const labels = Object.keys(categorias);
            const values = Object.values(categorias);
            
            // Cores
            const colors = [
                '#ff3860', '#ff6b6b', '#ffd93d', '#6bcb77', 
                '#4d96ff', '#7b2fff', '#00d2ff', '#ff8c00'
            ];
            
            const ctx = document.getElementById('categoryChart').getContext('2d');
            
            if (categoryChart) {
                categoryChart.destroy();
            }
            
            categoryChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: labels,
                    datasets: [{
                        data: values,
                        backgroundColor: colors.slice(0, labels.length),
                        borderColor: '#0a0e27',
                        borderWidth: 3,
                        hoverBorderColor: '#00ff88',
                        hoverBorderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: {
                                color: '#e0e0e0',
                                font: {
                                    family: 'Space Grotesk',
                                    size: 12
                                },
                                padding: 15
                            }
                        }
                    }
                }
            });
        }
        
        // Atualizar lista de transações
        function updateTransactionList() {
            const recentes = allData.slice(0, 10);
            const listEl = document.getElementById('transactionsList');
            
            if (recentes.length === 0) {
                listEl.innerHTML = '<p style="text-align: center; color: var(--text-secondary); padding: 20px;">Nenhum lançamento ainda</p>';
                return;
            }
            
            listEl.innerHTML = recentes.map(item => `
                <div class="transaction-item">
                    <div class="transaction-info">
                        <div class="transaction-desc">${item.subcategoria || item.categoria || 'Sem descrição'}</div>
                        <div class="transaction-meta">
                            ${item.responsavel || ''} • ${formatDate(item.timestamp)}
                        </div>
                    </div>
                    <div class="transaction-value ${item.tipo.toLowerCase()}">
                        ${item.tipo === 'Despesa' ? '-' : '+'} ${formatMoney(item.valor)}
                    </div>
                </div>
            `).join('');
        }
        
        // Formatar data
        function formatDate(timestamp) {
            if (!timestamp) return '';
            try {
                const date = new Date(timestamp);
                return date.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit' });
            } catch {
                return '';
            }
        }
        
        // Navegação
        function showTab(tab) {
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            event.target.closest('.nav-item').classList.add('active');
            
            if (tab === 'analise') {
                alert('📊 Em breve: análises detalhadas com filtros por período, exportação e comparativos!');
            }
        }
        
        // PWA Install
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('installBanner').style.display = 'block';
        });
        
        function installApp() {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then(() => {
                    document.getElementById('installBanner').style.display = 'none';
                });
            }
        }
        
        // Iniciar app
        loadData();
        
        // Atualizar a cada 30 segundos
        setInterval(loadData, 30000);
    </script>
</body>
</html>
