<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>FinanciFlow - Casal</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
</head>
<body class="login-body">
    <div class="login-container">
        <div class="login-card">
            <div class="logo-icon">💰</div>
            <h1>FinanciFlow</h1>
            <p>Controle financeiro do casal</p>
            
            <div class="login-options">
                <button onclick="fazerLogin('LUCAS')" class="login-btn lucas">
                    <span>👨‍💻</span> Lucas
                </button>
                <button onclick="fazerLogin('BEATRIZ')" class="login-btn beatriz">
                    <span>👩‍💻</span> Beatriz
                </button>
            </div>
            
            <div class="login-info">
                <small>⚡ Sincronizado com Google Sheets</small>
            </div>
        </div>
    </div>

    <script>
        function fazerLogin(nome) {
            localStorage.setItem('usuarioLogado', nome);
            window.location.href = 'dashboard.html';
        }
    </script>
</body>
</html>
