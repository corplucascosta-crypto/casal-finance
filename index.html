<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Financeiro do Casal - Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-body">
    <div class="login-container">
        <div class="login-card">
            <h1>💑 Financeiro do Casal</h1>
            <p>Escolha seu nome para continuar</p>
            
            <div class="login-options">
                <button onclick="fazerLogin('LUCAS')" class="login-btn lucas">
                    <span>👨</span> LUCAS
                </button>
                <button onclick="fazerLogin('BEATRIZ')" class="login-btn beatriz">
                    <span>👩</span> BEATRIZ
                </button>
                <button onclick="fazerLogin('CASAL')" class="login-btn casal">
                    <span>💑</span> CASAL
                </button>
            </div>
            
            <div class="login-info">
                <small>⚡ Dados sincronizados com Google Sheets</small>
            </div>
        </div>
    </div>

    <script>
        function fazerLogin(nome) {
            localStorage.setItem('usuarioLogado', nome);
            window.location.href = 'dashboard.html';
        }
    </script>
</body>
</html>
